steps:
  # Step 1: Pull image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Pull Image'
    args:
      - 'pull'
      - '${_IMAGETAG}'

  # Step 2: Save image as tar
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Save Tar'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker save -o /workspace/image.tar ${_IMAGETAG}
        echo "Listing workspace contents:"
        ls -l /workspace

  # Step 3: Upload tar to GCS
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'Upload Tar'
    args:
      - 'cp'
      - '/workspace/image.tar'
      - 'gs://images-push-test/$_IMAGETAG.tar'
      
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Retag image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DESTIMAGE=$(echo ${_IMAGETAG}) | \
        sed 's/project-7909eb0c-53df-4426-b83/my-sec-496201/' | \
        sed 's/first-gar/sec-gar/')
        echo "Destination Image: $$DESTIMAGE"
        docker tag ${_IMAGETAG} $$DESTIMAGE
        echo $$DESTIMAGE > /workspace/dest_image.txt
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DESTIMAGE=$(cat /workspace/dest_image.txt)
        docker push $$DESTIMAGE
      

options:
  logging: CLOUD_LOGGING_ONLY
