
steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Pulling image..."
        docker pull $_IMAGETAG

        echo "Saving image..."
        docker save -o /workspace/image.tar $_IMAGETAG

        echo "Verifying file..."
        ls -lh /workspace/

        echo "Uploading to GCS..."
        gsutil cp /workspace/image.tar gs://images-push-test/image.tar

timeout: '1200s'



