steps:
  # Step 1: Decode Pub/Sub message
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$_PAYLOAD" | base64 -d > message.json
        echo "Decoded message:"
        cat message.json

