steps:
  # Step 1: Pull image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Pull Image'
    args:
      - 'pull'
      - '${_IMAGETAG}'

  # Step 2: Save image as tar
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Save Tar'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker save -o /workspace/image.tar ${_IMAGETAG}
        echo "Listing workspace contents:"
        ls -l /workspace

  # Step 3: Upload tar to GCS
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'Upload Tar'
    args:
      - 'cp'
      - '/workspace/image.tar'
      - 'gs://images-push-test/dummyspring.tar'

options:
  logging: CLOUD_LOGGING_ONLY
``
